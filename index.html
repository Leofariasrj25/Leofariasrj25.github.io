    <script>
      const savedTheme = (() => {
        try {
          return localStorage.getItem("theme");
        } catch {
          return null;
        }
      })();
      // Default to dark theme
      if (savedTheme === "dark" || savedTheme === null || savedTheme === "light") {
        document.documentElement.classList.add("dark");
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
